<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trust-Flow</title>

<meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
    img-src 'self' data: https:;
    font-src 'self' https://cdnjs.cloudflare.com;
    connect-src 'self' https:;
">

<link rel="stylesheet" href="./src/index.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- ── Tabs ── -->
<div class="tabs">
    <div class="new-tab"><i class="fa-solid fa-plus"></i></div>
</div>

<!-- ── Navbar ── -->
<div class="navbar">
    <div class="nav-left">
        <button id="back" title="Back"><i class="fa-solid fa-arrow-left"></i></button>
        <button id="forward" title="Forward"><i class="fa-solid fa-arrow-right"></i></button>
        <button id="reload" title="Reload"><i class="fa-solid fa-rotate-right"></i></button>
    </div>

    <div class="address-bar">
        <!-- Shield Badge -->
        <div class="shield-badge" id="shield-badge">
            <div class="shield-spinner" id="scan-spinner" style="display:none;"></div>
            <i class="fa-solid fa-shield-halved shield-neutral" id="shield-icon"></i>
            <span id="shield-label"></span>
            <div class="shield-tooltip" id="shield-tooltip"></div>
        </div>

        <input id="url" type="text" placeholder="Search Google or type a URL" autocomplete="off">
    </div>

    <div class="nav-right">
        <button id="go" title="Go"><i class="fa-solid fa-magnifying-glass"></i></button>
        <button id="bookmark" title="Bookmark"><i class="fa-solid fa-star"></i></button>
        <button id="settings" title="Settings"><i class="fa-solid fa-gear"></i></button>
    </div>
</div>

<!-- ── Browser Area ── -->
<div class="browser"></div>

<!-- ── Settings Panel ── -->
<div class="settings-panel" id="settings-panel">
    <div class="panel-header">
        <h2><i class="fa-solid fa-shield-halved"></i> Trust-Flow Settings</h2>
        <button id="close-panel"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <div class="panel-section">
        <label class="panel-label">VirusTotal API Key</label>
        <input type="password" id="vt-key" placeholder="Enter your VT API key" class="panel-input">
        <small>Get a free key at <a href="#" onclick="return false;" style="color:#60a5fa">virustotal.com</a></small>
    </div>

    <div class="panel-section">
        <label class="panel-label">Security Features</label>
        <div class="toggle-row">
            <span>ML URL Classifier</span>
            <label class="toggle"><input type="checkbox" id="toggle-ml" checked><span class="slider"></span></label>
        </div>
        <div class="toggle-row">
            <span>WHOIS Domain Intelligence</span>
            <label class="toggle"><input type="checkbox" id="toggle-whois" checked><span class="slider"></span></label>
        </div>
        <div class="toggle-row">
            <span>Show Security Badge</span>
            <label class="toggle"><input type="checkbox" id="toggle-badge" checked><span class="slider"></span></label>
        </div>
    </div>

    <div class="panel-section">
        <label class="panel-label">Cache</label>
        <button class="btn-panel-secondary" id="clear-cache">Clear Scan Cache</button>
    </div>

    <div class="panel-section stats-section">
        <label class="panel-label">Session Stats</label>
        <div class="stat-row"><span>Sites Scanned</span><b id="stats-scanned">0</b></div>
        <div class="stat-row"><span>Threats Blocked</span><b id="stats-blocked">0</b></div>
    </div>

    <button class="btn-panel-primary" id="save-settings">Save Settings</button>
</div>

<script type="module" src="./src/renderer.js"></script>
</body>
</html>
