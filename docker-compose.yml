version: "3.9"

services:

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: trustflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-trustflow_redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-trustflow_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ML / Flask API ─────────────────────────────────────────
  ml-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trustflow-ml
    restart: unless-stopped
    ports:
      - "${ML_PORT:-5000}:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-trustflow_redis_secret}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-3600}
      - PORT=5000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis_data:
    driver: local
